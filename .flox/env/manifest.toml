schema-version = "1.12.0"

[install]
nodejs.pkg-path = "nodejs"
figlet.pkg-path = "figlet"

[hook]
on-activate = """
  npm install
  figlet -f slant "Yeargin Hubot"
  echo ""
"""

[build.yeargin-hubot]
description = "yeargin-hubot Slack bot"
version = "1.0.0"
command = """
  set -e

  mkdir -p "$out/lib/yeargin-hubot" "$out/bin"

  cp package.json package-lock.json external-scripts.json "$out/lib/yeargin-hubot/"
  cp -r src/ bin/ scripts/ "$out/lib/yeargin-hubot/"

  cd "$out/lib/yeargin-hubot"
  npm install --omit=dev

  cat > "$out/bin/yeargin-hubot" << 'WRAPPER'
#!/usr/bin/env bash
set -a
source .env
set +a
SCRIPT_DIR=$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)
cd "$SCRIPT_DIR/../lib/yeargin-hubot"
exec node node_modules/.bin/hubot --adapter @hubot-friends/hubot-slack --alias '!' "$@"
WRAPPER
  chmod +x "$out/bin/yeargin-hubot"
"""
