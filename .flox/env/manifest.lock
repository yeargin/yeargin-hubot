{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "figlet": {
        "pkg-path": "figlet"
      },
      "nodejs": {
        "pkg-path": "nodejs"
      }
    },
    "hook": {
      "on-activate": "  npm install\n  figlet -f slant \"Yeargin Hubot\"\n  echo \"\"\n"
    },
    "options": {},
    "build": {
      "yeargin-hubot": {
        "command": "  set -e\n\n  mkdir -p \"$out/lib/yeargin-hubot\" \"$out/bin\"\n\n  cp package.json package-lock.json external-scripts.json \"$out/lib/yeargin-hubot/\"\n  cp -r src/ bin/ scripts/ \"$out/lib/yeargin-hubot/\"\n\n  cd \"$out/lib/yeargin-hubot\"\n  npm install --omit=dev\n\n  cat > \"$out/bin/yeargin-hubot\" << 'WRAPPER'\n#!/usr/bin/env bash\nset -a\nsource .env\nset +a\nSCRIPT_DIR=$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\" && pwd)\ncd \"$SCRIPT_DIR/../lib/yeargin-hubot\"\nexec node node_modules/.bin/hubot --adapter @hubot-friends/hubot-slack --alias '!' \"$@\"\nWRAPPER\n  chmod +x \"$out/bin/yeargin-hubot\"\n",
        "version": "1.0.0",
        "description": "yeargin-hubot Slack bot"
      }
    }
  },
